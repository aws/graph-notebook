name: Build Docker image and publish to ECR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'ECR image tag type'
        required: false
        type: choice
        options:
          - 'latest'
          - 'release'
        default: 'latest'
  push:
    branches:
      - main

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Get package version
        id: package-version
        run: echo "version=$(jq -r .version ./src/graph_notebook/widgets/package.json)" >> $GITHUB_OUTPUT

      - name: Get image tag
        id: get-image-tag
        run: |
          if ${{ github.event_name == 'workflow_dispatch' }} ; then
            if ${{ inputs.image_tag == 'release'}}; then
              echo "image_tag=${{ steps.package-version.outputs.version }}" >> $GITHUB_OUTPUT
            else
              echo "image_tag=latest" >> $GITHUB_OUTPUT
            fi
          else
            echo "image_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: arn:aws:iam::967107632117:role/graph-notebook-ecr-publish
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v1
        with:
          registry-type: public

      - name: Build, tag, and push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr-public.outputs.registry }}
          REGISTRY_ALIAS: neptune
          REPOSITORY: graph-notebook
          IMAGE_TAG: ${{ steps.get-image-tag.outputs.image_tag }}
        run: |
          docker build -t $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:$IMAGE_TAG
